<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Köket Restaurang & Pizzeria</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: "#d946ef"
      },
      fontFamily: {
        sans: ["Plus Jakarta Sans", "sans-serif"]
      }
    }
  }
}
</script>

<style>
body {
  font-family: "Plus Jakarta Sans", sans-serif;
  background: #020202;
  color: white;
  overflow-x: hidden;
}

.glow-button {
  padding: 20px 40px;
  background: #d946ef;
  color: white;
  border-radius: 16px;
  font-weight: 900;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.2em;
  box-shadow: 0 0 40px rgba(217,70,239,0.4);
  transition: all .3s;
}

.glow-button:active {
  transform: scale(.95);
}

.border-text {
  -webkit-text-stroke: 1px currentColor;
  color: transparent;
}

@keyframes slow-zoom {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

.animate-slow-zoom {
  animation: slow-zoom 20s infinite alternate linear;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const RESTAURANT_PHONE = "+46702929024";

const navLinks = [
  { name: "Hem", href: "#" },
  { name: "Beställ Online", href: "#sms-order" },
  { name: "Dagens Lunch", href: "#lunch" },
  { name: "Meny", href: "#meny" },
  { name: "Kontakt", href: "#kontakt" },
];

const dishes = [
  { id: 1, name: "Margherita", price: "110 kr", image: "https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?q=80&w=2070&auto=format&fit=crop", category: "Pizza" },
  { id: 2, name: "Vesuvio", price: "120 kr", image: "https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?q=80&w=1935&auto=format&fit=crop", category: "Pizza" },
  { id: 3, name: "Calzone", price: "125 kr", image: "https://images.unsplash.com/photo-1534308983496-4fabb1a015ee?q=80&w=2076&auto=format&fit=crop", category: "Inbakad" },
  { id: 4, name: "Vegetaria", price: "130 kr", image: "https://images.unsplash.com/photo-1571407970349-bc81e7e96d47?q=80&w=1974&auto=format&fit=crop", category: "Pizza" },
];

function Icon({ children }) {
  return <span className="inline-flex items-center justify-center">{children}</span>;
}

function SectionHeader({ title, subtitle, align = "center", dark = false }) {
  return (
    <div className={`mb-12 ${align === "center" ? "text-center" : "text-left"}`}>
      <p className={`text-xs font-black uppercase tracking-[0.5em] mb-4 ${dark ? "text-black/30" : "text-accent"}`}>
        {subtitle}
      </p>
      <h2 className={`text-5xl md:text-7xl font-black uppercase tracking-tighter leading-[0.8] italic ${dark ? "text-black" : "text-white"}`}>
        {title}
      </h2>
    </div>
  );
}

function OrderForm() {
  const [submitted, setSubmitted] = useState(false);
  const [formData, setFormData] = useState({
    name: "",
    phone: "",
    dish: "",
    quantity: "1",
    extra: "",
    time: "",
    message: ""
  });

  function handleChange(e) {
    const { name, value } = e.target;
    setFormData(prev => ({ ...prev, [name]: value }));
  }

  function handleSMS() {
    if (!formData.name || !formData.phone || !formData.dish || !formData.time) {
      alert("Fyll i namn, telefon, maträtt och hämttid.");
      return;
    }

    const text =
`Hej Köket! Jag vill beställa take away:
Namn: ${formData.name}
Telefon: ${formData.phone}
Maträtt: ${formData.dish}
Antal: ${formData.quantity}
Extra: ${formData.extra || "Inga"}
Hämttid: ${formData.time}${formData.message ? "\nMeddelande: " + formData.message : ""}`;

    const isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
    const separator = isIOS ? "&" : "?";
    const smsUrl = `sms:${RESTAURANT_PHONE}${separator}body=${encodeURIComponent(text)}`;

    window.location.href = smsUrl;

    setTimeout(() => {
      setSubmitted(true);
    }, 1500);
  }

  function handleSubmit(e) {
    e.preventDefault();
    handleSMS();
  }

  if (submitted) {
    return (
      <div className="bg-white/5 border border-accent/30 p-12 rounded-[3rem] text-center">
        <div className="w-20 h-20 bg-accent rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_0_30px_rgba(217,70,239,0.5)] text-3xl">
          ✉
        </div>
        <h3 className="text-4xl font-black uppercase italic mb-4">Tack för din beställning!</h3>
        <p className="text-white/60 mb-8 max-w-sm mx-auto">
          Vi har öppnat din SMS-app. Skicka meddelandet för att slutföra beställningen.
        </p>
        <button
          onClick={() => setSubmitted(false)}
          className="text-accent font-black uppercase text-xs tracking-widest border-b border-accent pb-1"
        >
          Gör en till beställning
        </button>
      </div>
    );
  }

  return (
    <form onSubmit={handleSubmit} className="bg-white/5 border border-white/5 p-8 md:p-12 rounded-[3rem] backdrop-blur-xl text-left shadow-2xl">
      <div className="grid md:grid-cols-2 gap-8">

        <div className="space-y-2">
          <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Namn *</label>
          <input
            type="text"
            name="name"
            required
            value={formData.name}
            onChange={handleChange}
            placeholder="Ditt fullständiga namn"
            className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all placeholder:text-white/10"
          />
        </div>

        <div className="space-y-2">
          <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Telefon *</label>
          <input
            type="tel"
            name="phone"
            required
            value={formData.phone}
            onChange={handleChange}
            placeholder="07X-XXX XX XX"
            className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all placeholder:text-white/10"
          />
        </div>

        <div className="space-y-2">
          <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Välj Maträtt *</label>
          <select
            name="dish"
            required
            value={formData.dish}
            onChange={handleChange}
            className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all appearance-none"
          >
            <option value="" className="bg-[#050505]">Välj rätt...</option>
            {dishes.map(d => (
              <option key={d.name} value={d.name} className="bg-[#050505]">{d.name} ({d.price})</option>
            ))}
            <option value="Dagens Lunch" className="bg-[#050505]">Dagens Lunch</option>
          </select>
        </div>

        <div className="grid grid-cols-2 gap-4">
          <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Antal</label>
            <input
              type="number"
              name="quantity"
              min="1"
              value={formData.quantity}
              onChange={handleChange}
              className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all"
            />
          </div>

          <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Hämttid *</label>
            <input
              type="time"
              name="time"
              required
              value={formData.time}
              onChange={handleChange}
              className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all"
            />
          </div>
        </div>

        <div className="md:col-span-2 space-y-2">
          <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Extra önskemål</label>
          <input
            type="text"
            name="extra"
            value={formData.extra}
            onChange={handleChange}
            placeholder="Specialönskemål..."
            className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all placeholder:text-white/10"
          />
        </div>

        <div className="md:col-span-2 space-y-2">
          <label className="text-[10px] font-black uppercase tracking-[0.3em] text-white/40 ml-4">Meddelande till köket</label>
          <textarea
            name="message"
            value={formData.message}
            onChange={handleChange}
            rows="3"
            placeholder="Skriv något här..."
            className="w-full bg-white/5 border border-white/10 px-8 py-5 rounded-2xl focus:border-accent focus:outline-none transition-all placeholder:text-white/10 resize-none"
          ></textarea>
        </div>

        <div className="md:col-span-2 pt-6">
          <button
            type="submit"
            className="w-full px-8 py-6 bg-accent text-white rounded-2xl font-black uppercase text-sm tracking-[0.2em] shadow-[0_0_30px_rgba(217,70,239,0.4)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3"
          >
            Skicka Beställning
          </button>
        </div>

      </div>
    </form>
  );
}

function App() {
  const [isScrolled, setIsScrolled] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  useEffect(() => {
    const handleScroll = () => setIsScrolled(window.scrollY > 50);
    window.addEventListener("scroll", handleScroll);
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <div className="min-h-screen bg-[#020202] text-white selection:bg-accent selection:text-white">

      <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${
        isScrolled ? "bg-black/80 backdrop-blur-xl border-b border-white/5 py-4" : "bg-transparent py-6"
      }`}>
        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 bg-accent rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(217,70,239,0.5)] text-2xl">
              🍕
            </div>
            <span className="text-2xl font-black tracking-tighter uppercase">Köket</span>
          </div>

          <div className="hidden md:flex gap-10">
            {navLinks.map(link => (
              <a key={link.name} href={link.href} className="text-sm font-semibold tracking-widest uppercase hover:text-accent transition-colors">
                {link.name}
              </a>
            ))}
          </div>

          <button className="md:hidden text-white text-3xl" onClick={() => setMobileMenuOpen(true)}>
            ☰
          </button>
        </div>
      </nav>

      <section className="relative h-screen flex items-center px-6 sm:px-12 overflow-hidden">
        <div className="absolute inset-0">
          <img
            src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop"
            className="w-full h-full object-cover opacity-60 scale-110 animate-slow-zoom"
            alt="Pizza"
          />
          <div className="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent"></div>
        </div>

        <div className="relative max-w-7xl mx-auto w-full">
          <div>
            <div className="inline-flex items-center gap-2 px-4 py-2 bg-accent/20 border border-accent/30 rounded-full mb-8">
              <span className="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
              <span className="text-xs font-bold uppercase tracking-[0.2em] text-accent">Öppet ikväll till 22:00</span>
            </div>

            <h1 className="text-6xl md:text-9xl font-black mb-8 leading-[0.9] tracking-tighter uppercase italic">
              Smak av<br />
              <span className="text-transparent border-text text-fuchsia-500">Kvalitet</span>
            </h1>

            <p className="max-w-xl text-lg text-white/60 mb-12 font-medium leading-relaxed">
              God mat i Överkalix. Välkommen till en plats för pizza, dryck och trevlig atmosfär.
            </p>

            <div className="flex flex-col sm:flex-row items-center gap-6">
              <a href="#sms-order" className="glow-button">Beställ Online</a>
              <a href="#meny" className="px-10 py-5 border border-white/20 hover:bg-white hover:text-black rounded-2xl font-black uppercase text-xs tracking-[0.2em] transition-all">
                Utforska Meny
              </a>
            </div>
          </div>
        </div>
      </section>

      <section id="sms-order" className="py-32 bg-[#050505] px-6 sm:px-12">
        <div className="max-w-4xl mx-auto text-center">
          <SectionHeader title="Online Beställning" subtitle="Take Away Systems" />
          <OrderForm />
        </div>
      </section>

      <section id="lunch" className="py-32 relative overflow-hidden">
        <div className="max-w-7xl mx-auto px-6">
          <div className="grid md:grid-cols-2 gap-20 items-center">
            <div>
              <SectionHeader title="Dagens Lunch" subtitle="Måndag - Fredag 10:30-14:00" align="left" />
              <div className="space-y-6 mt-12">
                {[
                  ["Mån", "Klassisk Husmanskost & Pizza Buffé"],
                  ["Tis", "Grillad Kyckling med Rostad Potatis"],
                  ["Ons", "Pasta Carbonara & Stor Salladsbar"],
                  ["Tor", "Ärtsoppa & Pannkakor"],
                  ["Fre", "Helgstek med Gräddsås & Gelé"]
                ].map(item => (
                  <div key={item[0]} className="group flex items-start gap-6 p-6 bg-white/5 border border-white/5 rounded-3xl hover:bg-white/10 transition-colors">
                    <span className="text-accent font-black uppercase text-sm tracking-widest pt-1">{item[0]}</span>
                    <p className="text-xl font-bold">{item[1]}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="relative">
              <div className="aspect-[4/5] rounded-[3rem] overflow-hidden">
                <img
                  src="https://images.unsplash.com/photo-1528605248644-14dd04022da1?q=80&w=2070&auto=format&fit=crop"
                  className="w-full h-full object-cover"
                  alt="Atmosphere"
                />
              </div>
              <div className="absolute -bottom-10 -left-10 bg-accent p-10 rounded-[3rem] shadow-2xl hidden lg:block">
                <span className="block text-4xl font-black italic">125:-</span>
                <span className="text-xs font-bold uppercase tracking-widest text-white/80 italic">Inkl. dryck, kaffe & kaka</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="meny" className="py-32 bg-white text-black px-6 sm:px-12">
        <div className="max-w-7xl mx-auto">
          <div className="flex flex-col md:flex-row justify-between items-end gap-10 mb-20">
            <SectionHeader title="Vår Meny" subtitle="Utvalda rätter" dark align="left" />
            <div className="flex gap-4 flex-wrap">
              {["Pizza", "Pasta", "Grill", "Sallad"].map(cat => (
                <button key={cat} className="px-6 py-2 border-2 border-black rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-black hover:text-white transition-all">
                  {cat}
                </button>
              ))}
            </div>
          </div>

          <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-10">
            {dishes.map(dish => (
              <div key={dish.id} className="group cursor-pointer">
                <div className="relative aspect-square rounded-[2rem] overflow-hidden mb-6 bg-gray-100">
                  <img src={dish.image} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={dish.name} />
                  <div className="absolute top-4 right-4 bg-white px-4 py-2 rounded-xl font-bold shadow-lg">{dish.price}</div>
                </div>

                <div className="flex justify-between items-center px-2">
                  <div>
                    <h3 className="text-2xl font-black uppercase tracking-tight">{dish.name}</h3>
                    <p className="text-sm font-bold text-black/40 uppercase tracking-widest italic">{dish.category}</p>
                  </div>
                  <div className="w-10 h-10 border-2 border-black rounded-full flex items-center justify-center group-hover:bg-accent group-hover:border-accent transition-all">
                    →
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer id="kontakt" className="pt-32 pb-12 bg-black px-6 sm:px-12">
        <div className="max-w-7xl mx-auto border-t border-white/10 pt-20">
          <div className="grid md:grid-cols-4 gap-16 mb-20">
            <div className="col-span-2">
              <h2 className="text-5xl font-black uppercase tracking-tighter mb-8 leading-[0.8] italic">Hitta Hit</h2>
              <div className="flex items-start gap-4 mb-10">
                <span className="text-accent mt-1 text-2xl">📍</span>
                <p className="text-2xl font-bold leading-none">Storgatan 12,<br />956 31 Överkalix</p>
              </div>
              <div className="flex gap-6 mt-12">
                <a href="#" className="w-14 h-14 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-accent hover:border-accent transition-all text-white/60 hover:text-white">◎</a>
                <a href="#" className="w-14 h-14 border border-white/10 rounded-2xl flex items-center justify-center hover:bg-accent hover:border-accent transition-all text-white/60 hover:text-white">f</a>
              </div>
            </div>

            <div>
              <h4 className="text-xs font-black uppercase tracking-[0.3em] text-white/40 mb-10">Öppettider</h4>
              <div className="space-y-6">
                <div className="flex justify-between border-b border-white/5 pb-4">
                  <span className="font-bold uppercase text-sm tracking-widest">Mån - Tor</span>
                  <span className="font-bold text-accent">10:30 - 21:00</span>
                </div>
                <div className="flex justify-between border-b border-white/5 pb-4">
                  <span className="font-bold uppercase text-sm tracking-widest">Fre</span>
                  <span className="font-bold text-accent">10:30 - 22:00</span>
                </div>
                <div className="flex justify-between">
                  <span className="font-bold uppercase text-sm tracking-widest">Lör - Sön</span>
                  <span className="font-bold text-accent">12:00 - 22:00</span>
                </div>
              </div>
            </div>

            <div>
              <h4 className="text-xs font-black uppercase tracking-[0.3em] text-white/40 mb-10">Kontakt</h4>
              <p className="text-3xl font-black mb-4">0926-771 00</p>
              <p className="text-sm font-bold text-white/40 uppercase tracking-widest">info@koket.se</p>
            </div>
          </div>

          <div className="flex flex-col md:flex-row justify-between items-center border-t border-white/5 pt-12 text-[10px] font-black uppercase tracking-[0.4em] text-white/20 gap-4">
            <p>© 2024 Köket Restaurang & Pizzeria.</p>
            <p>Design by EB WEB DESIGN</p>
          </div>
        </div>
      </footer>

      {mobileMenuOpen && (
        <div className="fixed inset-0 z-[60] bg-black p-10 flex flex-col justify-center">
          <button className="absolute top-10 right-10 text-white text-5xl" onClick={() => setMobileMenuOpen(false)}>
            ×
          </button>

          <div className="flex flex-col gap-8">
            {navLinks.map(link => (
              <a key={link.name} href={link.href} onClick={() => setMobileMenuOpen(false)} className="text-5xl font-black uppercase tracking-tighter italic leading-none hover:text-accent transition-colors">
                {link.name}
              </a>
            ))}
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
