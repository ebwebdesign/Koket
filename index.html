<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script>
tailwind.config = {

</script>

<style>
body {
  font-family: Inter, sans-serif;
  background: #0a0a0a;
}
.stroke-text {
  -webkit-text-stroke: 1px rgba(255,255,255,0.45);

}

  font-weight: 900;
  text-transform: uppercase;

  transition: .25s;

</head>

<body>
<div id="root"></div>

<script type="text/babel">

const RESTAURANT_PHONE = "+46702929024";

const dishes = [
  { name: "Husets Special", price: 129, desc: "Oxfilé, sparris, bearnaisesås", category: "Pizza" },
  { name: "Mafioso", price: 119, desc: "Salami, lök, tomater, feferoni", category: "Pizza" },
  { name: "Vesuvio", price: 105, desc: "Skinka, ost, tomatsås", category: "Pizza" },
  { name: "Kebabtallrik", price: 135, desc: "Kebabkött, pommes, sallad, sås", category: "Kebab" },
  { name: "Kycklingsallad", price: 125, desc: "Kyckling, majs, paprika, dressing", category: "Sallad" },
];

function Navigation() {
  const [open, setOpen] = React.useState(false);

  const navLinks = [
    ["Hem", "#"],
    ["Beställ Online", "#sms-order"],
    ["Dagens Lunch", "#lunch"],
    ["Meny", "#meny"],
    ["Kontakt", "#kontakt"],
  ];

  return (
    <nav className="fixed w-full z-50 bg-black/90 backdrop-blur-md py-4 shadow-2xl border-b border-fuchsia-500/20">
      <div className="max-w-7xl mx-auto px-6 sm:px-12 flex justify-between items-center">
        <a href="#" className="flex items-center gap-3">
          <div className="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.5)]">
            <span className="text-xl">🍽️</span>
          </div>
          <span className="text-2xl font-black uppercase tracking-tighter text-white">
            Köket <span className="text-accent italic font-light">Överkalix</span>
          </span>
        </a>

        <div className="hidden md:flex items-center gap-10">
          {navLinks.map(([name, href]) => (
            <a key={name} href={href} className="text-xs uppercase font-bold tracking-[0.2em] text-white/70 hover:text-accent transition-all">
              {name}
            </a>
          ))}
          <a href="#sms-order" className="glow-button">Beställ Nu</a>
        </div>

        <button className="md:hidden text-white text-3xl" onClick={() => setOpen(!open)}>
          {open ? "×" : "☰"}
        </button>
      </div>

      {open && (
        <div className="absolute top-full left-0 w-full bg-black border-b border-fuchsia-500/30 md:hidden py-10 px-6">
          <div className="flex flex-col gap-8 text-center">
            {navLinks.map(([name, href]) => (
              <a key={name} href={href} onClick={() => setOpen(false)} className="text-sm uppercase font-bold tracking-widest text-white/80">
                {name}
              </a>
            ))}
          </div>
        </div>
      )}
    </nav>
  );
}

function SectionHeader({ title, subtitle, dark = true }) {
  return (
    <div className="mb-20 text-center">
      <span className="text-accent font-black uppercase tracking-[0.4em] text-xs block mb-4">
        {subtitle}
      </span>
      <h2 className={`text-4xl md:text-6xl font-black uppercase tracking-tighter ${dark ? "text-white" : "text-black"}`}>
        {title}
      </h2>
      <div className="w-20 h-1 bg-accent mx-auto mt-6 rounded-full shadow-[0_0_15px_rgba(217,70,239,0.5)]"></div>
    </div>
  );
}

function Hero() {
  return (
    <section className="relative min-h-screen flex items-center pt-32 pb-20 px-6 sm:px-12 overflow-hidden bg-[#0a0a0a]">
      <div className="absolute top-1/4 right-0 w-[500px] h-[500px] bg-accent/20 rounded-full blur-[150px]"></div>
      <div className="absolute bottom-1/4 left-0 w-[400px] h-[400px] bg-blue-500/10 rounded-full blur-[150px]"></div>

      <div className="max-w-7xl mx-auto w-full grid lg:grid-cols-2 gap-20 items-center relative z-10">
        <div>
          <div className="inline-flex items-center gap-2 px-4 py-2 bg-accent/10 border border-fuchsia-500/30 rounded-full text-accent font-bold text-xs uppercase tracking-widest mb-8">
            ★ Restaurang i Överkalix
          </div>

          <h1 className="text-6xl md:text-8xl font-black text-white uppercase tracking-tighter leading-[0.9] mb-8">
            Köket <br />
            <span className="stroke-text italic font-light">Restaurang</span>
          </h1>

          <p className="text-white/60 text-lg md:text-xl max-w-lg mb-10 font-light leading-relaxed">
            God mat i Överkalix. Välkommen till en plats för pizza, dryck och trevlig atmosfär.
          </p>

          <div className="flex flex-col sm:flex-row items-center gap-6">
            <a href="#sms-order" className="glow-button">Beställ Online</a>
            <a href="#meny" className="flex items-center gap-3 text-white/80 hover:text-white font-bold uppercase text-xs tracking-widest">
              Se hela menyn →
            </a>
          </div>

          <div className="grid grid-cols-3 gap-8 mt-20 border-t border-white/10 pt-10">
            <div>
              <div className="text-3xl font-black text-white">4.8</div>
              <div className="text-[10px] uppercase tracking-widest text-white/40 mt-1 font-bold">Google Betyg</div>
            </div>
            <div>
              <div className="text-3xl font-black text-white">20+</div>
              <div className="text-[10px] uppercase tracking-widest text-white/40 mt-1 font-bold">År i Branschen</div>
            </div>
            <div>
              <div className="text-3xl font-black text-white">50+</div>
              <div className="text-[10px] uppercase tracking-widest text-white/40 mt-1 font-bold">Maträtter</div>
            </div>
          </div>
        </div>

        <div className="relative hidden lg:block">
          <div className="relative z-10 w-[600px] h-[600px] bg-gradient-to-tr from-accent/20 to-transparent rounded-full flex items-center justify-center border border-white/10">
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center rounded-full mix-blend-overlay opacity-30"></div>
            <div className="w-[85%] h-[85%] bg-black/40 backdrop-blur-2xl rounded-full border border-white/10 flex flex-col items-center justify-center p-12 text-center">
              <div className="text-8xl mb-8">🍕</div>
              <h3 className="text-3xl font-black text-white uppercase italic tracking-tighter mb-4">Husets Special</h3>
              <p className="text-white/60 font-light text-sm italic">
                Oxfilé, sparris, cocktailtomater och bearnaisesås. En klassiker för finsmakaren.
              </p>
              <div className="mt-8 text-2xl font-black text-accent tracking-tighter">129 KR</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Lunch() {
  return (
    <section id="lunch" className="py-32 px-6 sm:px-12 bg-white text-black">
      <div className="max-w-7xl mx-auto">
        <SectionHeader title="Dagens Lunch" subtitle="Veckans Erbjudande" dark={false} />

        <div className="grid lg:grid-cols-2 gap-20 items-center">
          <div className="space-y-8 bg-black/5 p-10 rounded-[40px] border border-black/5">
            <div className="flex justify-between items-start border-b border-black/10 pb-6">
              <div>
                <h4 className="text-xl font-black uppercase italic tracking-tighter">Måndag - Fredag</h4>
                <p className="text-black/60 mt-2 font-medium">Inkl. läsk, kaffe, salladsbuffé och kaka.</p>
              </div>
              <div className="text-3xl font-black text-accent tracking-tighter leading-none text-right">
                119 <span className="text-xs uppercase block text-black/40 mt-1">KR</span>
              </div>
            </div>

            <div className="flex gap-6 items-center">
              <div className="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white shrink-0 shadow-lg">⏰</div>
              <div>
                <span className="text-[10px] uppercase font-black text-black/40 block">Tider</span>
                <span className="text-lg font-bold">Vardagar 10:30 - 14:00</span>
              </div>
            </div>

            <div className="p-8 bg-white rounded-3xl border border-black/5 shadow-xl">
              <h5 className="text-xs font-black uppercase tracking-widest text-accent mb-4">Välj bland hela menyn</h5>
              <p className="text-black/60 leading-relaxed italic">
                Under lunchen erbjuder vi utvalda pizzor, kebabrätter och fräscha sallader till reducerat pris inklusive full service.
              </p>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4 h-[600px]">
            <div className="bg-[url('https://images.unsplash.com/photo-1574126154517-d1e0d89ef734?q=80&w=1974&auto=format&fit=crop')] bg-cover bg-center rounded-[40px] h-full shadow-2xl"></div>
            <div className="space-y-4 h-full">
              <div className="bg-[url('https://images.unsplash.com/photo-1594007654729-407eedc4be65?q=80&w=1928&auto=format&fit=crop')] bg-cover bg-center rounded-[40px] h-[55%] shadow-2xl"></div>
              <div className="bg-accent rounded-[40px] h-[40%] flex flex-col items-center justify-center p-8 text-center text-white shadow-2xl shadow-fuchsia-500/20">
                <div className="text-5xl mb-4">🍴</div>
                <h4 className="text-xl font-bold uppercase tracking-tighter">Nygräddat</h4>
                <p className="text-xs uppercase tracking-widest mt-2 font-black opacity-60">Varje dag</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function MenuSection({ setDish }) {
  return (
    <section id="meny" className="py-32 px-6 sm:px-12 bg-[#0a0a0a]">
      <div className="max-w-7xl mx-auto">
        <SectionHeader title="Vår Meny" subtitle="Gräddat med kärlek" />

        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
          {dishes.map((item) => (
            <div
              key={item.name}
              onClick={() => {
                setDish(item.name);
                document.getElementById("sms-order").scrollIntoView({ behavior: "smooth" });
              }}
              className="group p-8 bg-neutral-900/50 border border-white/5 rounded-[32px] hover:border-accent/40 transition-all duration-500 hover:-translate-y-2 cursor-pointer"
            >
              <div className="flex justify-between items-start mb-4">
                <span className="text-[10px] font-black uppercase tracking-widest text-accent px-3 py-1 bg-accent/10 rounded-full">
                  {item.category}
                </span>
                <span className="text-2xl font-black text-white italic tracking-tighter">
                  {item.price} KR
                </span>
              </div>
              <h4 className="text-xl font-bold uppercase mb-2 tracking-tighter text-white/90">
                {item.name}
              </h4>
              <p className="text-white/40 text-sm font-light italic leading-relaxed">
                {item.desc}
              </p>
              <div className="mt-8 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                <span className="text-[10px] uppercase font-black tracking-widest text-accent">
                  Välj denna rätt →
                </span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function OrderForm({ selectedDish, setSelectedDish }) {
  const [submitted, setSubmitted] = React.useState(false);
  const [form, setForm] = React.useState({
    name: "",
    phone: "",
    quantity: "1",
    extra: "",
    time: "",
    message: ""
  });

  const sendSMS = (e) => {
    e.preventDefault();

    if (!form.name || !form.phone || !selectedDish || !form.time) {
      alert("Fyll i namn, telefon, maträtt och hämttid.");
      return;
    }

    const text =
`Hej Köket! Jag vill beställa take away:
Namn: ${form.name}
Telefon: ${form.phone}
Maträtt: ${selectedDish}
Antal: ${form.quantity}
Extra: ${form.extra || "Inga"}
Hämttid: ${form.time}${form.message ? "\nMeddelande: " + form.message : ""}`;

    const isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
    const sep = isIOS ? "&" : "?";
    window.location.href = `sms:${RESTAURANT_PHONE}${sep}body=${encodeURIComponent(text)}`;

    setTimeout(() => setSubmitted(true), 1200);
  };

  if (submitted) {
    return (
      <div className="bg-accent/5 border border-accent/20 rounded-3xl p-12 text-center">
        <div className="w-20 h-20 bg-accent rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_0_30px_rgba(217,70,239,0.5)] text-4xl">✓</div>
        <h3 className="text-3xl font-black text-white uppercase tracking-tighter mb-4">
          Tack för din beställning!
        </h3>
        <p className="text-white/60 max-w-md mx-auto mb-10 font-light">
          Din beställning har förberetts i SMS-appen. Glöm inte att trycka på “Skicka”.
        </p>
        <button onClick={() => setSubmitted(false)} className="text-xs uppercase font-bold tracking-widest text-accent">
          Gör en ny beställning
        </button>
      </div>
    );
  }

  return (
    <form onSubmit={sendSMS} className="space-y-6 text-left">
      <div className="grid md:grid-cols-2 gap-6">
        <div className="space-y-2">
          <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Namn *</label>
          <input required value={form.name} onChange={e => setForm({...form, name:e.target.value})} placeholder="Ditt namn..." className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder:text-white/20 focus:border-accent outline-none" />
        </div>
        <div className="space-y-2">
          <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Telefon *</label>
          <input required value={form.phone} onChange={e => setForm({...form, phone:e.target.value})} placeholder="07X-XXXXXXX" className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder:text-white/20 focus:border-accent outline-none" />
        </div>
      </div>

      <div className="grid md:grid-cols-3 gap-6">
        <div className="md:col-span-2 space-y-2">
          <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Välj Maträtt *</label>
          <select required value={selectedDish} onChange={e => setSelectedDish(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-accent outline-none">
            <option value="" className="bg-black text-white">Välj från menyn...</option>
            {dishes.map(d => <option key={d.name} value={d.name} className="bg-black text-white">{d.name} - {d.price} kr</option>)}
          </select>
        </div>
        <div className="space-y-2">
          <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Antal</label>
          <input type="number" min="1" value={form.quantity} onChange={e => setForm({...form, quantity:e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-accent" />
        </div>
      </div>

      <div className="space-y-2">
        <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Extra önskemål</label>
        <input value={form.extra} onChange={e => setForm({...form, extra:e.target.value})} placeholder="T.ex. utan lök, sås vid sidan..." className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder:text-white/20 focus:border-accent outline-none" />
      </div>

      <div className="space-y-2">
        <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Önskad hämttid *</label>
        <input required type="time" value={form.time} onChange={e => setForm({...form, time:e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-accent outline-none" />
      </div>

      <div className="space-y-2">
        <label className="text-[10px] uppercase font-bold tracking-widest text-white/40 ml-4">Övrigt meddelande</label>
        <textarea rows="3" value={form.message} onChange={e => setForm({...form, message:e.target.value})} placeholder="Skriv något här..." className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white placeholder:text-white/20 focus:border-accent outline-none resize-none"></textarea>
      </div>

      <button type="submit" className="w-full px-8 py-6 bg-accent text-white rounded-2xl font-black uppercase text-sm tracking-[0.2em] shadow-[0_0_30px_rgba(217,70,239,0.4)]">
        Skicka Beställning
      </button>
    </form>
  );
}

function Footer() {
  return (
    <footer id="kontakt" className="bg-black pt-40 pb-12 px-6 sm:px-12 relative overflow-hidden">
      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-accent to-transparent opacity-30"></div>

      <div className="max-w-7xl mx-auto grid md:grid-cols-2 lg:grid-cols-4 gap-16 mb-32">
        <div className="space-y-8">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-accent rounded-xl flex items-center justify-center">🍽️</div>
            <span className="text-2xl font-black uppercase tracking-tighter text-white">
              Köket <span className="text-accent italic font-light">Överkalix</span>
            </span>
          </div>
          <p className="text-white/40 text-sm font-light leading-relaxed">
            Vi är stolta över att leverera god mat i Överkalix. Med fokus på kvalitet och service.
          </p>
        </div>

        <div className="space-y-8">
          <h4 className="text-white font-black uppercase tracking-widest text-xs">Öppettider</h4>
          <ul className="space-y-4 text-sm">
            <li className="flex justify-between"><span className="text-white/40">Mån - Tor</span><span>10:30 - 21:00</span></li>
            <li className="flex justify-between"><span className="text-white/40">Fredag</span><span>10:30 - 21:00</span></li>
            <li className="flex justify-between"><span className="text-white/40">Lördag</span><span>12:00 - 21:00</span></li>
            <li className="flex justify-between"><span className="text-white/40">Söndag</span><span>12:00 - 21:00</span></li>
          </ul>
        </div>

        <div className="space-y-8">
          <h4 className="text-white font-black uppercase tracking-widest text-xs">Snabblänkar</h4>
          <ul className="space-y-4 text-sm text-white/60">
            <li><a href="#meny">Meny</a></li>
            <li><a href="#lunch">Dagens Lunch</a></li>
            <li><a href="#sms-order">Beställ Online</a></li>
          </ul>
        </div>

        <div className="space-y-8">
          <h4 className="text-white font-black uppercase tracking-widest text-xs">Hitta hit</h4>
          <p className="text-white font-bold text-sm">Storgatan 12</p>
          <p className="text-white/40 text-xs uppercase tracking-widest">956 31 Överkalix</p>
          <p className="text-white font-bold text-sm mt-6">+46 70 292 90 24</p>
        </div>
      </div>

      <div className="max-w-7xl mx-auto pt-12 border-t border-white/5 text-center">
        <p className="text-white/20 text-[10px] uppercase tracking-[0.3em] font-bold">
          © 2026 Köket Överkalix • Design av EB WEB DESIGN
        </p>
      </div>
    </footer>
  );
}

function App() {
  const [selectedDish, setSelectedDish] = React.useState("");

  return (
    <main className="bg-[#0a0a0a] min-h-screen text-white selection:bg-accent selection:text-white">
      <Navigation />
      <Hero />
      <Lunch />
      <MenuSection setDish={setSelectedDish} />
      <section id="sms-order" className="py-32 bg-[#050505] px-6 sm:px-12">
        <div className="max-w-4xl mx-auto text-center">
          <SectionHeader title="Online Beställning" subtitle="Take Away Systems" />
          <OrderForm selectedDish={selectedDish} setSelectedDish={setSelectedDish} />
        </div>
      </section>
      <Footer />
    </main>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
